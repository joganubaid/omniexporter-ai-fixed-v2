<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <title>OmniExporter AI</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="toast.css">
  <link rel="stylesheet" href="notion-picker.css">
</head>
<body>
  <script src="error-boundary.js"></script>
  <div id="error-boundary" style="display:none;background:#1a0505;color:#f87171;padding:10px 12px;font-size:12px;border-bottom:1px solid #3a1010;"></div>
  <div class="popup">
    <div id="omni-toast-container" class="omni-toast-container"></div>

    <!-- Header -->
    <header class="popup-header">
      <div class="popup-brand">
        <!-- Logo placeholder: replace src with real logo when ready -->
        <img src="../../icons/icon32.png" alt="OmniExporter" class="popup-logo" onerror="this.style.display='none'" />
        <span class="popup-name">OmniExporter</span>
      </div>
      <div class="popup-platform">
        <span class="platform-dot" id="platformDot"></span>
        <span class="platform-label" id="platform-status">Detecting…</span>
      </div>
    </header>

    <!-- Main -->
    <main class="popup-main">

      <!-- Export actions -->
      <div class="action-group">
        <p class="action-label">Export current chat</p>
        <div class="export-row">
          <div class="export-dropdown" id="exportDropdown">
            <button class="btn btn-primary" id="exportBtn">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Export
              <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="dropdown-menu" id="exportMenu">
              <button class="dropdown-item" data-format="markdown">
                <span class="di-icon">MD</span> Markdown (.md)
              </button>
              <button class="dropdown-item" data-format="json">
                <span class="di-icon">{}</span> JSON (.json)
              </button>
            </div>
          </div>
          <button class="btn btn-notion" id="saveToNotionBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
            Notion
          </button>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Dashboard -->
      <button class="btn btn-dashboard" id="openDashboard">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Open Dashboard
      </button>

      <!-- Auto-Sync -->
      <div class="sync-row">
        <span class="sync-label">Auto-Sync</span>
        <div class="sync-right">
          <span class="sync-badge" id="syncStatus">OFF</span>
          <button class="sync-toggle" id="toggleSync">Toggle</button>
        </div>
      </div>

      <!-- Status -->
      <div id="status" class="status-msg"></div>
    </main>
  </div>

  <script src="../utils/logger.js"></script>
  <script src="../utils/shared-utils.js"></script>
  <script src="../utils/toast.js"></script>
  <script src="../utils/export-manager.js"></script>
  <script src="../utils/notion-block-builder.js"></script>
  <script src="notion-picker.js"></script>
  <script src="../../config.js"></script>
  <script src="../../auth/notion-oauth.js"></script>
  <script src="popup.js"></script>
</body>
</html>
